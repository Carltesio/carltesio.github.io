<form
  class="connect-form"
  id="connectForm"
  action="https://formspree.io/f/REPLACE_WITH_YOUR_ID"
  method="POST"
>
  <label class="connect-label" for="connectEmail">Email</label>
  <input
    id="connectEmail"
    name="email"
    type="email"
    class="connect-input"
    placeholder="your@email.com"
    required
  />

  <fieldset class="connect-fieldset">
    <legend class="connect-label">Topic</legend>

    <div class="topic-options">
      <input type="radio" name="topic" id="topic-wearables" value="Wearables tech" />
      <label for="topic-wearables" class="topic-pill">Wearables tech</label>

      <input type="radio" name="topic" id="topic-gait" value="Gait analysis" />
      <label for="topic-gait" class="topic-pill">Gait analysis</label>

      <input type="radio" name="topic" id="topic-it" value="IT general" />
      <label for="topic-it" class="topic-pill">IT general</label>

      <input type="radio" name="topic" id="topic-startup" value="Start up" />
      <label for="topic-startup" class="topic-pill">Start up</label>
    </div>
  </fieldset>

  <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" class="hp-field" />
  <input type="hidden" name="_subject" value="New connection request" />
  <input type="hidden" name="message" id="connectMessage" value="" />

  <button type="submit" class="connect-send" id="connectSend" disabled>
    Send
  </button>
</form>
